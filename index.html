<!DOCTYPE html>
<html>
<head>
    <title>Most Mahjong Obsessed States</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #1a1a1a; color: #d4af37; font-family: Arial, sans-serif; text-align: center; }
        header { padding: 20px; border-bottom: 3px solid #d4af37; margin-bottom: 20px; }
        #map { height: 600px; width: 1000px; margin: 0 auto; background: #262626; border-radius: 8px; }
        .state-label { 
            background: none !important; 
            border: none !important; 
            color: #000 !important; 
            font-weight: bold; 
            font-size: 12px; 
            box-shadow: none !important;
        }
        /* Custom Table Styling to match your screenshot */
        table { width: 1000px; margin: 20px auto; border-collapse: collapse; background: #262626; }
        th { background: #d4af37; color: #000; padding: 10px; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #444; color: #fff; }
    </style>
</head>
<body>

<header>
    <h1>MOST MAHJONG OBSESSED STATES</h1>
    <p>VEGAS INSIDER DATA ANALYTICS</p>
</header>

<div id="map"></div>

<script>
    // Initialize map centered on US
    var map = L.map('map', {zoomControl: false, attributionControl: false}).setView([37.8, -96], 4);

    // Fetch GeoJSON for US States
    fetch('https://raw.githubusercontent.com/PublicaMundi/MappingPython/master/data/us_states.json')
        .then(res => res.json())
        .then(data => {
            L.geoJson(data, {
                style: function(feature) {
                    // Match the gold colorscale logic
                    return {
                        fillColor: '#d4af37',
                        weight: 1,
                        opacity: 1,
                        color: 'white',
                        fillOpacity: 0.7
                    };
                },
                onEachFeature: function(feature, layer) {
                    // Add Rank Labels as static DIVs
                    // We can precisely control these coordinates
                    var center = layer.getBounds().getCenter();
                    L.marker(center, {
                        icon: L.divIcon({
                            className: 'state-label',
                            html: "1", // Example: Logic would pull from your data
                            iconSize: [20, 20]
                        })
                    }).addTo(map);
                }
            }).addTo(map);
        });
</script>

</body>
</html>
